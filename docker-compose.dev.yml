version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: rpi-waybill-printer-backend
    ports:
      - "5000:5000"
    volumes:
      # Mount source code for hot-reload during development
      - ./app:/app/app
      - ./run.py:/app/run.py
      # Persist database and logs
      - ./app/instance:/app/app/instance
      - ./app/logs:/app/app/logs
      - ./app/storage:/app/app/storage
      # NO CUPS socket mount for local development (macOS/Windows)
    environment:
      - ENVIRONMENT=development
      - DEBUG=True
      - HOST=0.0.0.0
      - PORT=5000
      - CLEANUP_INTERVAL_MINUTES=30
      - CLEANUP_HOURS_THRESHOLD=6
    restart: unless-stopped
    networks:
      - waybill-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: rpi-waybill-printer-frontend
    ports:
      - "5173:5173"
    volumes:
      # Mount source for hot-reload
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tsconfig.json:/app/tsconfig.json
      # Prevent node_modules from being overwritten
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - waybill-network

networks:
  waybill-network:
    driver: bridge
