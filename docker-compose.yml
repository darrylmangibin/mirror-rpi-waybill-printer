version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: rpi-waybill-printer-backend
    ports:
      - "5000:5000"
    volumes:
      # Mount source code for hot-reload during development
      - ./app:/app/app
      - ./run.py:/app/run.py
      # Persist database and logs
      - ./app/instance:/app/app/instance
      - ./app/logs:/app/app/logs
      - ./app/storage:/app/app/storage
    devices:
      # Pass through all USB devices for printer access
      - /dev/bus/usb:/dev/bus/usb
    environment:
      - ENVIRONMENT=development
      - DEBUG=True
      - HOST=0.0.0.0
      - PORT=5000
      - CLEANUP_INTERVAL_MINUTES=30
      - CLEANUP_HOURS_THRESHOLD=6
      # Auto-configure printer (set by docker.sh or manually)
      - PRINTER_NAME=${PRINTER_NAME:-}
      - PRINTER_URI=${PRINTER_URI:-}
    restart: unless-stopped
    networks:
      - waybill-network
    # Allow container to access CUPS for printing (Linux only)
    privileged: true

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: rpi-waybill-printer-frontend
    ports:
      - "5173:5173"
    volumes:
      # Mount source for hot-reload
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/.env:/app/.env
      # Prevent node_modules from being overwritten
      - /app/node_modules
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - waybill-network

networks:
  waybill-network:
    driver: bridge
